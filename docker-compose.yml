services:
  db:
    image: postgres:16-alpine
    container_name: gestix_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gestix}
      POSTGRES_USER: ${POSTGRES_USER:-gestix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gestix}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gestix} -d ${POSTGRES_DB:-gestix}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: gestix_web
    restart: unless-stopped
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      POSTGRES_DB: ${POSTGRES_DB:-gestix}
      POSTGRES_USER: ${POSTGRES_USER:-gestix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gestix}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
