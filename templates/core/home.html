{% load static %}
<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GESTIX</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/home.css' %}">
</head>
<body>
    <main class="min-vh-100 d-flex align-items-center bg-light">
        <section class="container py-5">
            <div class="row justify-content-center text-center">
                <div class="col-lg-8">
                    <span class="badge rounded-pill text-bg-primary mb-3">GESTIX</span>
                    <h1 class="display-4 fw-bold mb-3">Sistema de gestão em construção</h1>
                    <p class="lead text-secondary mb-4">
                        Estrutura inicial criada com Django, Django REST Framework e PostgreSQL para evoluir os módulos de clientes, fornecedores, produtos, estoque, vendas, orçamentos, fiscal e dashboard.
                    </p>
                    <div class="d-flex gap-3 justify-content-center flex-wrap">
                        <a class="btn btn-primary btn-lg" href="/admin/">Acessar admin</a>
                        <a class="btn btn-outline-secondary btn-lg" href="https://www.django-rest-framework.org/" target="_blank" rel="noreferrer">Django REST Framework</a>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
